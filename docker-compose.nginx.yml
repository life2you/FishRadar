services:
  app:
    ports: []
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-goofish-monitor-nginx
    depends_on:
      app:
        condition: service_started
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
