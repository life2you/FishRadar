services:
  app:
    image: ${APP_IMAGE:-ghcr.io/life2you/fishradar:latest}
    container_name: ai-goofish-monitor-app
    pull_policy: always
    init: true
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: ${APP_DATABASE_URL:-mysql://fishradar:fishradar123@mysql:3306/fishradar?charset=utf8mb4}
    volumes:
      - ./.env:/app/.env
      - ./state:/app/state
      - ./logs:/app/logs
      - ./images:/app/images
    restart: unless-stopped
  mysql:
    image: mysql:8.4
    container_name: ai-goofish-monitor-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fishradar}
      MYSQL_USER: ${MYSQL_USER:-fishradar}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fishradar123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
